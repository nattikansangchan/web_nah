<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Nattikan Sangchan</title>
    <link rel="stylesheet" href="style.css">
</head><script>
const items = ["🤎", "🤍", "🍫", "✨"];

function createFloatItem() {
    const item = document.createElement("div");
    item.className = "float-item";
    item.innerHTML = items[Math.floor(Math.random() * items.length)];

    item.style.left = Math.random() * window.innerWidth + "px";
    item.style.fontSize = Math.random() * 18 + 16 + "px";

    document.body.appendChild(item);

    setTimeout(() => {
        item.remove();
    }, 8000);
}

// ลอยช้า ๆ ละมุน ๆ
setInterval(createFloatItem, 700);
</script>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "🤎"; // หัวใจสีน้ำตาล

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "-20px";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

// สร้างหัวใจทุก 500ms
setInterval(createHeart, 500);
</script>

<body>

    <div class="hero">
        

        <a href="about.html" class="next-btn">Next →</a>
        <script>
document.addEventListener("click", function (e) {

    const candies = ["🍬", "🍭", "🍫", "🍡"];
    const candy = document.createElement("div");

    candy.classList.add("candy");
    candy.innerText = candies[Math.floor(Math.random() * candies.length)];

    candy.style.left = e.clientX + "px";

    document.body.appendChild(candy);

    // ลบออกหลังตกเสร็จ
    setTimeout(() => {
        candy.remove();
    }, 3000);

});
</script>

    </div>

</body>
</html>
